name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 9 * * *"

jobs:
  checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest

      - name: Run Ruff
        run: |
          . .venv/bin/activate
          ruff check .
          ruff format --check .

      - name: Run mypy
        run: |
          . .venv/bin/activate
          mypy src

  dependency-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Audit declared dependencies
        run: |
          . .venv/bin/activate
          python scripts/audit_dependencies.py
